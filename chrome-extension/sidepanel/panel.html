<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>nomaebot NEW</span>
      </div>
      <div class="header-actions">
        <button id="settingsBtn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button id="resetBtn" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="messages"></div>

    <div id="settings" style="display:none">
      <div class="settings-field">
        <label>API Key (OpenRouter)</label>
        <input type="password" id="apiKey" placeholder="sk-or-v1-...">
      </div>
      <button id="saveSettings">Save</button>
      <div id="settingsStatus" style="font-size:11px;color:var(--text-secondary);margin-top:6px"></div>
    </div>

    <div id="composer">
      <div id="statusBar"></div>
      <div class="composer-row">
        <textarea id="input" placeholder="Tell nomaebot what to do..." rows="1"></textarea>
        <button id="sendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
